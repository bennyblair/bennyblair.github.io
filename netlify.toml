# Netlify Configuration for emetcapital.com.au
# Single source of truth for redirects - DO NOT duplicate in public/_redirects
# NOTE: www->non-www and http->https are handled via Netlify dashboard settings
# (Domain management + Force HTTPS). Do NOT add protocol/host redirects here
# as Netlify terminates TLS at the edge, causing redirect loops.

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# =============================================================================
# REDIRECTS - Order matters! More specific rules first, SPA fallback LAST
# =============================================================================

# NOTE: Trailing slash removal handled by Netlify post-processing settings.
# Do NOT add a /:splat/ redirect here — it causes 301 loops with Netlify's
# internal routing.

# =============================================================================
# CONTENT REDIRECTS - Canonical consolidation + legacy URL mappings
# =============================================================================

# Canonical path consolidation
# Case studies canonical live under /resources/case-studies/*
[[redirects]]
  from = "/case-studies"
  to = "/resources/case-studies"
  status = 301
  force = true

[[redirects]]
  from = "/case-studies/"
  to = "/resources/case-studies"
  status = 301
  force = true

[[redirects]]
  from = "/case-studies/:slug"
  to = "/resources/case-studies/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/case-studies/:slug/"
  to = "/resources/case-studies/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/resources/case-studies/"
