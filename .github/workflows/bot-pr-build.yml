name: Bot PR Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build bot PR
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'bennyblair' &&
      !github.event.pull_request.draft &&
      (
        startsWith(github.event.pull_request.head.ref, 'ai/llm-upgrade-') ||
        startsWith(github.event.pull_request.head.ref, 'ai/daily-content-')
      )
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: SEO page QA for changed articles
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD -- 'src/content/guides/*.md' 'src/content/case-studies/*.md')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed guide or case-study files."
            exit 0
          fi

          for file in "${files[@]}"; do
            npm run qa:seo-page -- --file "$file"

            slug="$(basename "$file" .md)"
            if [[ "$file" == src/content/case-studies/* ]]; then
              npm run qa:seo-page -- --route "/resources/case-studies/$slug"
            else
              npm run qa:seo-page -- --route "/resources/guides/$slug"
            fi
          done
