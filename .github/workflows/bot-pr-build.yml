name: Bot PR Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build bot PR
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'bennyblair' &&
      !github.event.pull_request.draft &&
      (
        startsWith(github.event.pull_request.head.ref, 'ai/llm-upgrade-') ||
        startsWith(github.event.pull_request.head.ref, 'ai/daily-content-')
      )
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
